<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CineRule — Your premium Indian cinema streaming experience">
  <title>CineRule | Home</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍿</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/netflix.css">
</head>
<body class="netflix-mode">

  <!-- NAVBAR (transparent, becomes solid on scroll) -->
  <nav class="navbar navbar-netflix" id="mainNav">
    <a href="catalog.html" class="nav-brand">🍿 <span>CineRule</span></a>
    <div class="nav-links">
      <a href="catalog.html" class="active">🏠 Home</a>
      <a href="recommend.html" id="navRecommend">🎯 Recommend</a>
      <a href="admin.html">⚙️ Admin</a>
    </div>

    <!-- MODERN SEARCH BAR (Integrated into Netflix Navbar) -->
    <div class="modern-search-container" style="flex: 0 1 350px; margin: 0 2rem;">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input type="text" id="catalogSearchInput" class="modern-search-input" placeholder="Search title, year, genre, language...">
    </div>

    <div class="nav-user">
      <span class="user-badge">👤 <span id="userName"></span></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <section class="hero-section" id="heroBanner">
    <div class="hero-backdrop" id="heroBackdrop"></div>
    <div class="hero-grain"></div>
    <div class="hero-gradient"></div>
    
    <button class="hero-nav-btn hero-nav-btn-prev" id="heroPrev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <button class="hero-nav-btn hero-nav-btn-next" id="heroNext">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
    </button>

    <div class="hero-content" id="heroContent">
      <!-- Dynamically populated -->
    </div>
  </section>

  <!-- MAIN CONTENT: Genre Rows -->
  <main class="netflix-main" id="netflixMain">
    <!-- Dynamically populated carousels -->
  </main>

  <!-- MOVIE DETAIL MODAL -->
  <div class="movie-modal-overlay" id="movieModalOverlay">
    <div class="movie-modal" id="movieModal">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="js/security.js?v=30"></script>
  <script src="js/data.js?v=30"></script>
  <script src="js/auth.js?v=30"></script>
  <script src="js/catalog.js?v=30"></script>
</body>
</html>
