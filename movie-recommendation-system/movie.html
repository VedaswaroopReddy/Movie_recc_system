<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineRule | Movie Details</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍿</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/netflix.css">
  <style>
    /* Dedicated Movie Page Styles */
    .movie-page-hero {
      position: relative;
      width: 100%;
      height: 75vh;
      display: flex;
      align-items: center;
      padding: 0 5%;
      margin-top: 75px; 
      background: #000;
    }
    .mp-backdrop {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      z-index: 1;
    }
    .mp-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #141414 10%, transparent 60%),
                  linear-gradient(to top, #141414 0%, transparent 40%);
      z-index: 2;
    }
    .mp-content {
      position: relative;
      z-index: 3;
      max-width: 60%;
    }
    .mp-title {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -2px;
    }
    .mp-meta {
      display: flex;
      gap: 1rem;
      color: #bcbcbc;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      align-items: center;
    }
    .mp-match {
      color: #46d369;
      font-weight: bold;
    }
    .mp-synopsis {
      font-size: 1.3rem;
      line-height: 1.5;
      color: #fff;
      margin-bottom: 2rem;
    }
    .mp-cast {
      font-size: 1rem;
      color: #777;
      margin-bottom: 2rem;
    }
    .mp-cast span {
      color: #fff;
    }
    .mp-actions {
      display: flex;
      gap: 1rem;
    }
    .mp-btn {
      padding: 0.8rem 2.5rem;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: none;
    }
    .mp-btn-play { background: #fff; color: #000; }
    .mp-btn-play:hover { background: #e6e6e6; }
    .mp-btn-add { background: rgba(109,109,110,0.7); color: #fff; }
    .mp-btn-add:hover { background: rgba(109,109,110,0.5); }
    
    .similar-container {
      padding: 2rem 5%;
      background: #141414;
    }
    .similar-title {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      font-weight: bold;
      color: #e5e5e5;
    }
  </style>
  <meta name="referrer" content="no-referrer">
</head>
<body class="netflix-mode">

  <!-- NAVBAR (same structure as catalog.html) -->
  <nav class="navbar navbar-netflix" id="mainNav">
    <a href="catalog.html" class="nav-brand">🍿 <span>CineRule</span></a>
    <div class="nav-links">
      <a href="catalog.html">🏠 Home</a>
      <a href="recommend.html">🎯 Recommend</a>
      <a href="admin.html">⚙️ Admin</a>
    </div>

    <!-- MODERN SEARCH BAR (Synced from Catalog) -->
    <div class="modern-search-container" style="flex: 0 1 350px; margin: 0 2rem;">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input type="text" id="catalogSearchInput" class="modern-search-input" placeholder="Search title, year, genre, language...">
    </div>

    <div class="nav-user">
      <span class="user-badge">👤 <span id="userName"></span></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Movie Details Hero -->
  <main id="movieContent"></main>

  <!-- Similar Movies -->
  <section class="similar-container">
    <h2 class="similar-title">More Like This</h2>
    <div class="carousel-container">
      <div class="carousel-track" id="similarMovies"></div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="js/security.js?v=30"></script>
  <script src="js/data.js?v=30"></script>
  <script src="js/auth.js?v=30"></script>
  <script src="js/movie.js?v=30"></script>
</body>
</html>
